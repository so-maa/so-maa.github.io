<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>so-maa</title>
  <style>
    /* 전체 기본 설정 */
    body {
      margin: 0;
      padding: 0;
      background-color: #FAFAFA;
      color: #09090B;
      font-family: 'Malgun Gothic', sans-serif;
    }

    /* 1. 상단: 배경 이미지와 겹치는 로고 영역 */
    .hero-section {
      position: relative;
      width: 100%;
      height: 300px;
      /* 👇 여기에 배경 이미지 링크를 넣었습니다! */
      background-image: url('https://i.postimg.cc/qvsbrXnh/M.jpg');
      background-size: cover; /* 사진이 잘리지 않고 꽉 차게 */
      background-position: center; /* 사진의 중앙을 보여줌 */
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* 겹치는 로고 박스 설정 */
    .logo-box {
      position: absolute;
      bottom: -40px;
      left: 10%;
      width: 120px;
      height: 120px;
      background-color: #FFFFFF;
      border: 2px solid #09090B;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      overflow: hidden; /* 이미지가 박스 선 밖으로 튀어나가지 않게 막아줌 */
    }

    /* 👇 로고 이미지 자체의 크기 조절 */
    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 박스에 여백 없이 꽉 차게 (만약 로고가 잘리면 'contain'으로 변경) */
    }

    /* 페이지 전체 좌우 여백 설정 (내용이 가운데로 모이게) */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* 2. 중단: 메뉴 영역 */
    .menu-section {
      margin-top: 80px;
      margin-bottom: 50px;
    }
    .menu-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      border: 1px solid #09090B;
      display: inline-block;
      padding: 5px 10px;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }
    .menu-item {
      border: 1px solid #09090B;
      padding: 20px;
      text-align: center;
      font-weight: bold;
      background-color: #FFFFFF;
      cursor: pointer;
    }

    /* 3. 하단: 게시판 영역 */
    .board-section {
      margin-bottom: 100px;
    }
    .board-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      border: 1px solid #09090B;
      display: inline-block;
      padding: 5px 10px;
    }
    .board-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }
    .board-col {
      /* 각 게시판 단락 */
    }
    .board-col-title {
      border: 1px solid #09090B;
      padding: 8px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
      background-color: #FFFFFF;
    }
    .board-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .board-list li {
      border-bottom: 1px solid #E4E4E7;
      padding: 10px 0;
      font-size: 14px;
      color: #3F3F46;
    }
  </style>
</head>
<body>

  <div class="hero-section">
    <div class="logo-box">
      <img src="https://i.postimg.cc/3JDfSHxj/B.png" alt="so-maa 로고">
    </div>
  </div>

  <div class="container">
    
    <div class="menu-section">
      <div class="menu-title">MEMU</div>
      <div class="menu-grid">
        <div class="menu-item">so-maa</div>
        <div class="menu-item">캐릭터</div>
        <div class="menu-item">세계관</div>
        <div class="menu-item">가이드</div>
      </div>
    </div>

    <div class="board-section">
      <div class="board-title">게시판</div>
      <div class="board-grid">
        
        <div class="board-col">
          <div class="board-col-title">이름</div>
          <ul class="board-list">
            <li>최신 게시글 제목 예시 1</li>
            <li>최신 게시글 제목 예시 2</li>
            <li>최신 게시글 제목 예시 3</li>
          </ul>
        </div>

        <div class="board-col">
          <div class="board-col-title">이름</div>
          <ul class="board-list">
            <li>최신 게시글 제목 예시 1</li>
            <li>최신 게시글 제목 예시 2</li>
            <li>최신 게시글 제목 예시 3</li>
          </ul>
        </div>

        <div class="board-col">
          <div class="board-col-title">이름</div>
          <ul class="board-list">
            <li>최신 게시글 제목 예시 1</li>
            <li>최신 게시글 제목 예시 2</li>
            <li>최신 게시글 제목 예시 3</li>
          </ul>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
